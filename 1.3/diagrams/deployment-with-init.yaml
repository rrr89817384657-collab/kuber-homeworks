apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-with-init
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-with-init
  template:
    metadata:
      labels:
        app: nginx-with-init
    spec:
      initContainers:
      - name: simple-delay
        image: busybox:1.35
        command: ['sleep', '15']
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
